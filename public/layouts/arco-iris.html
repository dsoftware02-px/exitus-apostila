<style>
	.kid-layout-rainbow {
		min-height: 297mm;
		width: 100%;
		margin: 0;
		padding: 7mm;
		box-sizing: border-box;
		background: linear-gradient(135deg, #fde68a 0%, #fbcfe8 28%, #ddd6fe 56%, #bfdbfe 78%, #a7f3d0 100%);
		position: relative;
		font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
		color: #1f2937;
		break-inside: auto;
		page-break-inside: auto;
		overflow: visible;
	}

	.rainbow-card {
		min-height: 270mm;
		box-sizing: border-box;
		background: #ffffff;
		border-radius: 20px;
		padding: 11mm 11mm 13mm 11mm;
		position: relative;
		z-index: 1;
		border: 2px solid #f9a8d4;
	}

	.rainbow-ribbon {
		display: table;
		margin: 0 auto 8mm;
		background: linear-gradient(90deg, #f59e0b, #ec4899, #8b5cf6, #3b82f6, #10b981);
		color: #ffffff;
		font-size: 20pt;
		font-weight: 800;
		line-height: 1.2;
		border-radius: 999px;
		padding: 5px 18px;
		text-align: center;
		text-shadow: 0 1px 2px rgba(0, 0, 0, 0.14);
	}

	.rainbow-main {
		font-family: 'Georgia', 'Times New Roman', serif;
		color: #2d1b47;
		font-size: 12pt;
		line-height: 1.72;
	}

	.rainbow-main h1,
	.rainbow-main h2,
	.rainbow-main h3,
	.rainbow-main h4 {
		color: #7c3aed;
		margin: 0 0 10px;
		line-height: 1.3;
	}

	.rainbow-main p,
	.rainbow-main li {
		margin: 0 0 10px;
		text-align: justify;
	}

	.rainbow-main ul,
	.rainbow-main ol {
		margin: 0 0 10px;
		padding-left: 24px;
	}

	.rainbow-main img {
		max-width: 100%;
		height: auto;
		border-radius: 10px;
	}

	.rainbow-main img[style*="float: left"] {
		margin: 0 10px 8px 0 !important;
	}

	.rainbow-main img[style*="float: right"] {
		margin: 0 0 8px 10px !important;
	}

	.rainbow-main img[style*="margin-left: auto"][style*="margin-right: auto"] {
		display: block;
		margin: 12px auto !important;
	}

	.rainbow-question {
		margin: 7mm auto;
		display: table;
		background: #f472b6;
		color: #ffffff;
		font-size: 21pt;
		font-weight: 800;
		border-radius: 12px;
		padding: 4px 18px;
		line-height: 1.2;
		text-align: center;
	}

	.rainbow-bottom {
		display: grid;
		grid-template-columns: 1.1fr 0.9fr;
		gap: 10px;
		align-items: stretch;
		margin-top: 6mm;
	}

	.rainbow-bottom-text {
		background: #fff7ed;
		border: 2px solid #fdba74;
		border-radius: 12px;
		padding: 10px 12px;
		font-family: 'Georgia', 'Times New Roman', serif;
		color: #3f3f46;
		font-size: 11.3pt;
		line-height: 1.65;
		text-align: justify;
	}

	.rainbow-image-slot {
		border-radius: 12px;
		overflow: hidden;
		min-height: 60mm;
		background: #ede9fe;
		border: 2px solid #c4b5fd;
	}

	.rainbow-image-slot img {
		width: 100%;
		height: 100%;
		object-fit: cover;
		display: block;
	}

	.rainbow-intro {
		margin-top: 7mm;
		background: #fdf2f8;
		border-left: 4px solid #f472b6;
		border-radius: 10px;
		padding: 10px 12px;
		color: #4c1d95;
		font-family: 'Georgia', 'Times New Roman', serif;
		font-size: 11pt;
		line-height: 1.6;
		text-align: justify;
	}

	/* Layout Blocks inside template */
	.rainbow-main .column-layout {
		display: grid;
		gap: 5mm;
		margin: 4mm 0;
	}
	.rainbow-main .column-layout.cols-2 { grid-template-columns: 1fr 1fr; }
	.rainbow-main .column-layout.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
	.rainbow-main .column-item { min-height: 8mm; }

	.rainbow-main .callout-box {
		border-radius: 8px;
		padding: 3mm 4mm;
		margin: 4mm 0;
		border-left: 4px solid;
		page-break-inside: avoid;
	}
	.rainbow-main .callout-box::before {
		font-size: 10pt;
		font-weight: 700;
		display: block;
		margin-bottom: 2mm;
	}
	.rainbow-main .callout-info { background: #eff6ff; border-left-color: #3b82f6; }
	.rainbow-main .callout-info::before { content: "ℹ️ Informação"; color: #1d4ed8; }
	.rainbow-main .callout-tip { background: #f0fdf4; border-left-color: #22c55e; }
	.rainbow-main .callout-tip::before { content: "💡 Dica"; color: #16a34a; }
	.rainbow-main .callout-warning { background: #fffbeb; border-left-color: #f59e0b; }
	.rainbow-main .callout-warning::before { content: "⚠️ Atenção"; color: #d97706; }
	.rainbow-main .callout-example { background: #faf5ff; border-left-color: #a855f7; }
	.rainbow-main .callout-example::before { content: "📝 Exemplo"; color: #9333ea; }

	.rainbow-main [data-type="page-break"] {
		break-after: page;
		page-break-after: always;
		height: 0; margin: 0; padding: 0; border: none;
	}
	.rainbow-main .spacer-block { display: block; border: none; background: none; }
</style>

<section class="kid-layout-rainbow">
	<article class="rainbow-card">
		<header class="rainbow-ribbon">{{SESSION_TITLE}}</header>

		<article class="rainbow-main">{{MAIN_CONTENT}}</article>

		<div class="rainbow-question">Qual aventura vem agora?</div>

		<section class="rainbow-bottom">
			<div class="rainbow-bottom-text">{{SIDEBAR_CONTENT}}</div>
			<div class="rainbow-image-slot">{{HERO_IMAGE}}</div>
		</section>

		<aside class="rainbow-intro">{{INTRO_TEXT}}</aside>
	</article>
</section>
