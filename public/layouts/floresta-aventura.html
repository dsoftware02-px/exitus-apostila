<style>
	.kid-layout-forest {
		min-height: 297mm;
		width: 100%;
		margin: 0;
		padding: 7mm;
		box-sizing: border-box;
		background: #9bd7a8;
		position: relative;
		font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
		color: #1f2937;
		break-inside: auto;
		page-break-inside: auto;
		overflow: visible;
	}

	.forest-card {
		min-height: 270mm;
		box-sizing: border-box;
		background: #ffffff;
		border-radius: 20px;
		padding: 11mm 11mm 13mm 11mm;
		position: relative;
		z-index: 1;
	}

	.forest-ribbon {
		display: table;
		margin: 0 auto 8mm;
		background: #f6b73c;
		color: #2f6b49;
		font-size: 20pt;
		font-weight: 800;
		line-height: 1.2;
		border-radius: 10px;
		padding: 4px 16px 5px;
		text-align: center;
	}

	.forest-main {
		font-family: 'Georgia', 'Times New Roman', serif;
		color: #20382b;
		font-size: 12pt;
		line-height: 1.72;
	}

	.forest-main h1,
	.forest-main h2,
	.forest-main h3,
	.forest-main h4 {
		color: #2f6b49;
		margin: 0 0 10px;
		line-height: 1.3;
	}

	.forest-main p,
	.forest-main li {
		margin: 0 0 10px;
		text-align: justify;
	}

	.forest-main ul,
	.forest-main ol {
		margin: 0 0 10px;
		padding-left: 24px;
	}

	.forest-main img {
		max-width: 100%;
		height: auto;
		border-radius: 8px;
	}

	.forest-main img[style*="float: left"] {
		margin: 0 10px 8px 0 !important;
	}

	.forest-main img[style*="float: right"] {
		margin: 0 0 8px 10px !important;
	}

	.forest-main img[style*="margin-left: auto"][style*="margin-right: auto"] {
		display: block;
		margin: 12px auto !important;
	}

	.forest-question {
		margin: 7mm auto;
		display: table;
		background: #f6b73c;
		color: #2f6b49;
		font-size: 21pt;
		font-weight: 800;
		border-radius: 12px;
		padding: 4px 18px;
		line-height: 1.2;
		text-align: center;
	}

	.forest-bottom {
		display: grid;
		grid-template-columns: 1.1fr 0.9fr;
		gap: 10px;
		align-items: stretch;
		margin-top: 6mm;
	}

	.forest-bottom-text {
		background: #f2fbe8;
		border: 2px solid #b2d98f;
		border-radius: 12px;
		padding: 10px 12px;
		font-family: 'Georgia', 'Times New Roman', serif;
		color: #2f4f39;
		font-size: 11.3pt;
		line-height: 1.65;
		text-align: justify;
	}

	.forest-image-slot {
		border-radius: 12px;
		overflow: hidden;
		min-height: 60mm;
		background: #dcfce7;
	}

	.forest-image-slot img {
		width: 100%;
		height: 100%;
		object-fit: cover;
		display: block;
	}

	.forest-intro {
		margin-top: 7mm;
		background: #f3faef;
		border-left: 4px solid #6db46d;
		border-radius: 10px;
		padding: 10px 12px;
		color: #2f4f39;
		font-family: 'Georgia', 'Times New Roman', serif;
		font-size: 11pt;
		line-height: 1.6;
		text-align: justify;
	}

	/* Layout Blocks inside template */
	.forest-main .column-layout {
		display: grid;
		gap: 5mm;
		margin: 4mm 0;
	}
	.forest-main .column-layout.cols-2 { grid-template-columns: 1fr 1fr; }
	.forest-main .column-layout.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
	.forest-main .column-item { min-height: 8mm; }

	.forest-main .callout-box {
		border-radius: 8px;
		padding: 3mm 4mm;
		margin: 4mm 0;
		border-left: 4px solid;
		page-break-inside: avoid;
	}
	.forest-main .callout-box::before {
		font-size: 10pt;
		font-weight: 700;
		display: block;
		margin-bottom: 2mm;
	}
	.forest-main .callout-info { background: #eff6ff; border-left-color: #3b82f6; }
	.forest-main .callout-info::before { content: "ℹ️ Informação"; color: #1d4ed8; }
	.forest-main .callout-tip { background: #f0fdf4; border-left-color: #22c55e; }
	.forest-main .callout-tip::before { content: "💡 Dica"; color: #16a34a; }
	.forest-main .callout-warning { background: #fffbeb; border-left-color: #f59e0b; }
	.forest-main .callout-warning::before { content: "⚠️ Atenção"; color: #d97706; }
	.forest-main .callout-example { background: #faf5ff; border-left-color: #a855f7; }
	.forest-main .callout-example::before { content: "📝 Exemplo"; color: #9333ea; }

	.forest-main [data-type="page-break"] {
		break-after: page;
		page-break-after: always;
		height: 0; margin: 0; padding: 0; border: none;
	}
	.forest-main .spacer-block { display: block; border: none; background: none; }
</style>

<section class="kid-layout-forest">
	<article class="forest-card">
		<header class="forest-ribbon">{{SESSION_TITLE}}</header>

		<article class="forest-main">{{MAIN_CONTENT}}</article>

		<div class="forest-question">O que vamos descobrir?</div>

		<section class="forest-bottom">
			<div class="forest-bottom-text">{{SIDEBAR_CONTENT}}</div>
			<div class="forest-image-slot">{{HERO_IMAGE}}</div>
		</section>

		<aside class="forest-intro">{{INTRO_TEXT}}</aside>
	</article>
</section>
